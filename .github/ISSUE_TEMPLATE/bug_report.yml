name: 🐛 Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug in a few words
      placeholder: "When I tap Feed, the app crashes"
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Tap Feed
        3. Enter 100
        4. App crashes
    validations:
      required: false
  
  - type: dropdown
    id: device
    attributes:
      label: Device (optional)
      options:
        - Pixel
        - Samsung
        - OnePlus
        - Other Android
        - Prefer not to say
    validations:
      required: false
  
  - type: input
    id: version
    attributes:
      label: App version (found in Settings)
      placeholder: "v15.0.0"
    validations:
      required: false
